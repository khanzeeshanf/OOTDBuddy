<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOTDBuddy | Your Personal Outfit Guide</title>
    <meta name="description" content="Get weather-based outfit recommendations for your next outing.">
    <link rel="icon" type="image/png" href="OOTDBuddy.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700&family=Caveat:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <img src="OOTDBuddy.png" alt="OOTDBuddy Logo" class="logo-img">
                <h1>OOTDBuddy</h1>
            </div>
            <p class="subtitle">Dress smart, stay ready.</p>
        </header>

        <main>
            <section class="search-section card">
                <div class="input-group">
                    <label for="city-input">Where are you going?</label>
                    <input type="text" id="city-input" placeholder="Enter city (e.g., London, Tokyo)" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label for="duration-select">How long are you staying out?</label>
                    <select id="duration-select">
                        <option value="2">2 Hours</option>
                        <option value="4" selected>4 Hours</option>
                        <option value="8">8 Hours</option>
                        <option value="12">12 Hours</option>
                        <option value="24">Full Day</option>
                    </select>
                </div>

                <button id="get-recommendation-btn" class="primary-btn">
                    <span>Get Suggestions</span>
                    <i class="btn-icon">✨</i>
                </button>
            </section>

            <section id="results-section" class="results-section hidden">
                <div id="weather-card" class="weather-card card">
                    <div class="weather-main">
                        <div class="temp-display">
                            <span id="current-temp">--</span>°C
                        </div>
                        <div class="weather-info">
                            <h2 id="location-name">City Name</h2>
                            <p id="weather-desc">Weather condition</p>
                        </div>
                    </div>
                </div>

                <div class="recommendation-card card glass">
                    <h3>Outfit Recommendation</h3>
                    <div id="recommendation-content" class="content">
                        <!-- Suggestions will be injected here -->
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>Powered by Open-Meteo & Created with ❤️ by <a href="https://www.linkedin.com/in/zeeshan-khan-003741245" target="_blank">Zeeshan</a> | <a href="https://x.com/zeeshanByte" target="_blank">X (Twitter)</a></p>
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="overlay hidden">
        <div class="spinner"></div>
        <p>Analyzing weather patterns...</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
